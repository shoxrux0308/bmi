name: bmi_ocr_nlp
description: "Sun'iy intellekt yordamida OCR + NLP tahlil qiluvchi ilova – Shamsiddinova Muhabbat"
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP va networking
  dio: ^5.4.3
  flutter_secure_storage: ^9.0.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  fl_chart: ^0.67.0

  # File picker va kamera
  file_picker: ^8.0.3
  image_picker: ^1.0.7
  dotted_border: ^2.1.0

  # Local storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # PDF va eksport
  pdf: ^3.11.3
  printing: ^5.14.2
  path_provider: ^2.1.2
  open_file: ^3.3.2

  # State management
  provider: ^6.1.2

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
